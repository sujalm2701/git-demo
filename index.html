<!-- after editing your content 
1 - it will show *MODIFIED* or *UNTRACKED* (for new file)
2 - After adding it will show it as *STAGED* (which means ready to change)
for this write git add (name of the file)
if we want to add all files at once we do git add . (dot means all files)

3 - after commiting it will show *UNCHANGED*
