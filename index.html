<!-- Making a new folder using terminal we do--
 mkdir foldername 
 
*Then we do    *git init* to make it a git repository*

(the indication that it is not a git repository can be checked by
commanding ls -Force if it shows .git then it is a git repository 
otherwise it is not.)

after doing this we will make a new repo using github
and then we add it so that this folder wil be shown inside that repo.To do this

git remote add origin (link of the github repo)

here *origin* is the *name* of the remote repository and we can give any name to it
and remote refers to the the remote github repo which we want to add

we use git "remote -v" to check the remote repository which we have added

brach--in a project there are many teams working together 
so the works is divided and each team have a copy of the project in the main branch
they perform their tasks and then upload this in their specific brances
and then the changes are merged in the main branch


to check in which branch we are working we do "git branch"
it will first show as *master* but now master is replaced by *main* so we will rename it
to rename we do "git branch -M main" (m stands for move)
now we can push the code by git push origin main
we can also do "git push -u origin main"
(u stands for upstream)this means to set main branch as the default so that
 another time we can directly write git push and it will push it to the 
 upstream branch i.e-default branch(here main)

to make a new branch we do "git checkout -b (name of the branch)"
to move form one branch to another we do "git checkout (name of the branch)"

to delete a branch we do "git branch -d (name of the branch)"

now the code in the feature1 and main are diff and to push the feture1 will noe do
git push origin feature1



now there are two ways to merge the code from feature1 to main
1.using git commands
2.using github PR(pull request)

Using git commands we do
step 1. git diff main(it will compare the code diff in main and feature1)
step 2. git merge (branch name) (here we will finally merge it)

Using github we do
we create a pull request(PR) it tells the changes we have made or the new features added

in github the PR is created by clicking on the compare and pull request button
and then we click on create pull request and then we can merge it by clicking on merge pull
the person who is merging the code can also add some comments about the change and then merge it

now to see the change of the remote repository in our local folder 
we do "git pull origin main"
Pull command--it is used to pull the changes from the remote repository to our local folder

MERGE CONFLICTS--when two branches have some changes in the
 same line of code then it is called merge conflict

 it can we resolved by manually deciding which code to keep and then
 commit the changes in one and merging the other branch to it.

Undoing Changes--
when we *added* a change by mistakenly [not commited it yet] then we can do 
git reset (name of the file)
or git reset  [to reset all added changes at once]

When we added a changed by mistakenly and also commited(for only 1 commit back) it then we do
git reset HEAD~1(here HEAD--means the commits) if we write *~1* This means 
reset the recent commit(HEAD)

for many commits back we do 
first we copy its hash(it is the code we can get by git log)
then we write git reset (code)

To also see the code after our final reset we can do 
git reset --hard (code) or only  *git reset --hard*

to check the history of the commits we do "git log" command
it will show the commit history with the name of the author and the date and time of the commit and the commit message


Use of "Fork"
It is used to keep a copy of the repo of someone else
We can also pull a request after modifing
